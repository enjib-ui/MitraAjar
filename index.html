<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitra Ajar - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-sidebar: #152033;
            --bg-active: #00b4d8;
            --bg-header: #0f172a;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --bg-main: #f8fafc;
            --accent-color: #00b4d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: #333;
            overflow-x: hidden;
        }

        /* --- STYLING HALAMAN LOGIN --- */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-header);
            padding: 20px;
        }

        .login-card {
            background: var(--bg-sidebar);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* 🛠️ TAMBAHAN: Styling untuk Logo Gambar di Halaman Login */
        .login-logo {
            max-width: 300px; /* Atur lebar maksimal logo */
            height: auto;
            margin-bottom: 15px;
            display: inline-block;
        }


        .form-group {
            position: relative;
            margin-bottom: 22px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 8px rgba(0, 180, 216, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #0096b4;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border-left: 4px solid #ef4444;
            display: none;
        }

        /* Container Utama Dasbor */
        .app-container {
            display: none;
            min-height: 100vh;
            position: relative;
        }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-brand {
            background-color: var(--bg-header);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-brand i { font-size: 1.4rem; }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            flex-grow: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            cursor: pointer;
        }

        .menu-item i { width: 20px; text-align: center; font-size: 1.1rem; }
        .menu-item:hover { background-color: rgba(255, 255, 255, 0.05); color: var(--text-color); }
        .menu-item.active { background-color: var(--bg-active); color: var(--text-color); font-weight: 500; }

        /* --- MAIN CONTENT STYLE --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100vh;
        }

        .mobile-header {
            background-color: var(--bg-sidebar);
            color: white;
            padding: 15px 20px;
            display: none; 
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 90;
        }

        .menu-toggle-btn { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; }

        /* --- KONTEN TOP BAR --- */
        .content-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px 5px 20px;
        }
        .content-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }
        .btn-share {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: none; 
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
            transition: background 0.2s;
        }
        .btn-share:hover { background-color: #059669; }

        /* Area Konten */
        .content-body {
            padding: 10px 15px 15px 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Styling Khusus Iframe */
        #appFrame {
            flex-grow: 1;
            width: 100%;
            border: none;
            border-radius: 12px;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5); z-index: 99;
        }

        /* --- RESPONSIVE LAYOUT --- */
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 0; left: -280px; bottom: 0; height: 100vh; }
            .sidebar.active { left: 0; }
            .sidebar-overlay.active { display: block; }
            .content-body { padding: 10px; }
            #appFrame { border-radius: 8px; }
            .content-topbar { padding: 10px 15px 0 15px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper" id="loginView">
        <div class="login-card">
            <div class="login-header">
                <img src="logo.png" alt="Logo Mitra Ajar" class="login-logo">
            </div>
            
            <div class="login-error" id="loginError">Pesan kesalahan akan muncul di sini.</div>
            
            <form id="loginForm" onsubmit="prosesLogin(event)">
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Email Sekolah / Pengajar" required autocomplete="email">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Kata Sandi" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLoginSubmit">Masuk</button>
            </form>
        </div>
    </div>

    <div class="app-container" id="dashboardView">
        
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-graduation-cap"></i>
                <span>Mitra Ajar</span>
            </div>
            
            <nav class="sidebar-menu">
                <a class="menu-item active" onclick="gantiMenu(this, 'dashboard')">
                    <i class="fas fa-columns"></i>
                    <span>Dashboard</span>
                </a>

                <a class="menu-item" onclick="gantiMenu(this, 'jadwal')">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Jadwal Mengajar</span>
                </a>

                <a class="menu-item" onclick="gantiMenu(this, 'absensi')">
                    <i class="fas fa-user-check"></i>
                    <span>Absensi Siswa</span>
                </a>
                
                <a class="menu-item" onclick="gantiMenu(this, 'ujian')">
                    <i class="fas fa-file-signature"></i>
                    <span>Ujianku</span>
                </a>
                
                <a class="menu-item" onclick="gantiMenu(this, 'mojar')">
                    <i class="fas fa-book-open"></i>
                    <span>Buat Mojar</span>
                </a>
                
                <a class="menu-item" onclick="gantiMenu(this, 'soal')">
                    <i class="fas fa-pen-to-square"></i>
                    <span>Buat Soal</span>
                </a>

                <a class="menu-item" onclick="gantiMenu(this, 'pengaturan')">
                    <i class="fas fa-cog"></i>
                    <span>Pengaturan</span>
                </a>

                <a class="menu-item" style="color: #f87171; background: rgba(239, 68, 68, 0.03);" onclick="prosesLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Keluar Akun</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="mobile-header">
                <button class="menu-toggle-btn" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <span>Mitra Ajar</span>
            </header>

            <div class="content-topbar">
                <span class="content-title" id="pageTitle">Dashboard</span>
                <button class="btn-share" id="btnShare" onclick="salinLinkUjian()">
                    <i class="fas fa-copy"></i> <span id="btnShareText">Salin Link Ujian</span>
                </button>
            </div>

            <div class="content-body">
                <iframe id="appFrame" src="about:blank" title="Modul Aplikasi GuruKu"></iframe>
            </div>
        </main>

    </div>

    <script>
        // --- CONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD0nWqWCqesIXpnSyLK4Aj9n0gPCaSdGGs",
            authDomain: "absensiwajah-ea3d3.firebaseapp.com",
            databaseURL: "https://absensiwajah-ea3d3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "absensiwajah-ea3d3",
            storageBucket: "absensiwajah-ea3d3.firebasestorage.app",
            messagingSenderId: "1054931924470",
            appId: "1:1054931924470:web:01d5770b6cedd7bbff03d7"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- DOM ELEMENTS ---
        const loginView = document.getElementById('loginView');
        const dashboardView = document.getElementById('dashboardView');
        const loginError = document.getElementById('loginError');
        const btnLoginSubmit = document.getElementById('btnLoginSubmit');

        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const iframe = document.getElementById('appFrame');
        const pageTitle = document.getElementById('pageTitle');
        const btnShare = document.getElementById('btnShare');
        const btnShareText = document.getElementById('btnShareText');

        // Variabel Global Data Aplikasi
        let USER_UID = "";
        const LINK_UJIAN = "https://ujianku-1.netlify.app/"; 

        // --- AUTH STATE OBSERVER ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                USER_UID = user.uid;
                loginView.style.display = "none";
                dashboardView.style.display = "flex";
                
                const defaultActiveMenu = document.querySelector('.menu-item.active');
                gantiMenu(defaultActiveMenu, 'dashboard');
            } else {
                USER_UID = "";
                dashboardView.style.display = "none";
                loginView.style.display = "flex";
                loginError.style.display = "none";
                document.getElementById('loginForm').reset();
                iframe.src = "about:blank";
            }
        });

        // --- PROSES LOGIN FIREBASE ---
        function prosesLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const sandi = document.getElementById('loginPassword').value;

            btnLoginSubmit.innerText = "Memproses...";
            btnLoginSubmit.disabled = true;
            loginError.style.display = "none";

            auth.signInWithEmailAndPassword(email, sandi)
                .then((userCredential) => {
                    btnLoginSubmit.innerText = "Masuk ke Dasbor";
                    btnLoginSubmit.disabled = false;
                })
                .catch((error) => {
                    btnLoginSubmit.innerText = "Masuk ke Dasbor";
                    btnLoginSubmit.disabled = false;
                    loginError.style.display = "block";
                    
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        loginError.innerText = "Kombinasi email atau kata sandi salah. Harap periksa kembali.";
                    } else if (error.code === 'auth/invalid-email') {
                        loginError.innerText = "Format penulisan email salah atau tidak valid.";
                    } else if (error.code === 'auth/too-many-requests') {
                        loginError.innerText = "Akses diblokir sementara karena terlalu banyak kegagalan percobaan. Coba lagi nanti.";
                    } else {
                        loginError.innerText = "Gagal masuk: " + error.message;
                    }
                });
        }

        // --- PROSES LOGOUT ---
        function prosesLogout() {
            if (confirm("Apakah Anda yakin ingin keluar dari aplikasi?")) {
                auth.signOut().catch((err) => {
                    alert("Gagal keluar akun: " + err.message);
                });
            }
        }

        // --- FITUR SIDEBAR INTERAKTIF ---
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }

        menuToggle.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
        
        function gantiMenu(elemen, jenisMenu) {
            if(!elemen) return;

            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            elemen.classList.add('active');

            if(window.innerWidth <= 768) {
                toggleSidebar();
            }

            iframe.removeAttribute('srcdoc');
            btnShare.style.display = "none";

            if (jenisMenu === 'dashboard') {
                pageTitle.innerText = "Dashboard";
                iframe.src = "dashboard.html";
            } else if (jenisMenu === 'jadwal') {
                pageTitle.innerText = "Kelola Jadwal Mengajar";
                iframe.srcdoc = `
                    <!DOCTYPE html>
                    <html lang="id">
                    <head>
                        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
                        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
                        <style>
                            body { font-family: 'Poppins', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; margin: 0;}
                            .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
                            .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
                            .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; color: white; display: inline-flex; gap: 8px; align-items: center; transition: 0.2s;}
                            .btn-success { background: #10b981; } .btn-success:hover { background: #059669; }
                            .btn-primary { background: #00b4d8; padding: 6px 12px; font-size: 0.8rem;} .btn-primary:hover { background: #0096b4; }
                            .btn-danger { background: #ef4444; padding: 10px; } .btn-danger:hover { background: #dc2626; }
                            .day-section { margin-bottom: 20px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 15px; }
                            .day-title { font-weight: 600; color: #0369a1; background: #e0f2fe; display: inline-block; padding: 6px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 0.9rem;}
                            .form-row { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px; align-items: center; }
                            @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
                            input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 0.85rem; outline: none; }
                        </style>
                    </head>
                    <body>
                        <div class="card">
                            <div class="card-header">
                                <h3 style="font-size: 1.1rem; margin:0;"><i class="fas fa-edit" style="color:#00b4d8;"></i> Atur Jadwal Mengajar Mingguan</h3>
                                <button class="btn btn-success" onclick="simpanJadwal()"><i class="fas fa-save"></i> Simpan Perubahan</button>
                            </div>
                            <div id="editor-container"></div>
                        </div>
                        <script>
                            const defaultJadwal = {
                                "Senin": [{ jam: "07:00 - 08:30", mapel: "Matematika Wajib", kelas: "XI-RPL 1", ruang: "Ruang 10" }],
                                "Selasa": [{ jam: "09:00 - 10:30", mapel: "Fisika Dasar", kelas: "XI-RPL 1", ruang: "Laboratorium Komputer" }],
                                "Rabu": [], "Kamis": [], "Jumat": [], "Sabtu": []
                            };
                            let jadwalData = JSON.parse(localStorage.getItem("guruJadwalMaster")) || defaultJadwal;
                            const hariList = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                            
                            function render() {
                                const container = document.getElementById('editor-container');
                                container.innerHTML = '';
                                hariList.forEach(hari => {
                                    let rowsHtml = '';
                                    (jadwalData[hari] || []).forEach((item, idx) => {
                                        rowsHtml += '<div class="form-row" id="row-' + hari + '-' + idx + '">' +
                                            '<input type="text" placeholder="Jam (cth: 07:00-08:30)" value="' + item.jam + '" data-field="jam">' +
                                            '<input type="text" placeholder="Mata Pelajaran" value="' + item.mapel + '" data-field="mapel">' +
                                            '<input type="text" placeholder="Kelas" value="' + item.kelas + '" data-field="kelas">' +
                                            '<input type="text" placeholder="Ruang" value="' + item.ruang + '" data-field="ruang">' +
                                            '<button class="btn btn-danger" onclick="hapusBaris(\\'' + hari + '\\', ' + idx + ')"><i class="fas fa-trash"></i></button>' +
                                        '</div>';
                                    });
                                    container.innerHTML += '<div class="day-section">' +
                                        '<div class="day-title">' + hari + '</div>' +
                                        '<div id="container-' + hari + '">' + rowsHtml + '</div>' +
                                        '<button class="btn btn-primary" onclick="tambahBaris(\\'' + hari + '\\')"><i class="fas fa-plus"></i> Tambah Jam</button>' +
                                    '</div>';
                                });
                            }

                            function tambahBaris(hari) {
                                if(!jadwalData[hari]) jadwalData[hari] = [];
                                jadwalData[hari].push({jam: "", mapel: "", kelas: "", ruang: ""});
                                render();
                            }

                            function hapusBaris(hari, idx) {
                                jadwalData[hari].splice(idx, 1);
                                render();
                            }

                            function simpanJadwal() {
                                hariList.forEach(hari => {
                                    const rows = document.querySelectorAll('#container-' + hari + ' .form-row');
                                    const newData = [];
                                    rows.forEach(row => {
                                        const jam = row.querySelector('[data-field="jam"]').value;
                                        const mapel = row.querySelector('[data-field="mapel"]').value;
                                        const kelas = row.querySelector('[data-field="kelas"]').value;
                                        const ruang = row.querySelector('[data-field="ruang"]').value;
                                        if(jam || mapel || kelas) newData.push({jam, mapel, kelas, ruang});
                                    });
                                    jadwalData[hari] = newData;
                                });
                                localStorage.setItem("guruJadwalMaster", JSON.stringify(jadwalData));
                                alert("✨ Jadwal berhasil diperbarui!");
                                window.parent.postMessage({ action: 'pindahMenu', menu: 'dashboard' }, '*');
                            }
                            render();
                        <\/script>
                    </body>
                    </html>
                `;
            } else if (jenisMenu === 'absensi') {
                pageTitle.innerText = "Absensi Siswa";
                iframe.src = `absensi.html?uid=${USER_UID}`;
            } else if (jenisMenu === 'ujian') {
                pageTitle.innerText = "Ujianku";
                iframe.src = LINK_UJIAN;
                btnShare.style.display = "flex";
                btnShareText.innerText = "Salin Link Ujian"; 
            } else if (jenisMenu === 'soal') {
                pageTitle.innerText = "Buat Soal AI";
                iframe.src = "buatsoal.html";
            } else if (jenisMenu === 'mojar') {
                pageTitle.innerText = "Buat Modul Ajar (Mojar)";
                iframe.src = "mojar.html";
            } else {
                pageTitle.innerText = jenisMenu.toUpperCase();
                iframe.srcdoc = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100%; flex-direction:column; font-family: 'Poppins', sans-serif; color: #475569; background: #f8fafc;">
                        <h2 style="color: #0f172a; margin-bottom: 8px;">Modul ${jenisMenu.toUpperCase()}</h2>
                        <p>Halaman ini sedang dalam tahap pengembangan.</p>
                    </div>
                `;
            }
        }

        function salinLinkUjian() {
            navigator.clipboard.writeText(LINK_UJIAN).then(() => {
                btnShareText.innerText = "Link Berhasil Disalin! ✓";
                setTimeout(() => { btnShareText.innerText = "Salin Link Ujian"; }, 2500);
            }).catch(err => {
                alert("Gagal menyalin link: ", err);
            });
        }

        window.addEventListener('message', function(event) {
            if (event.data.action === 'pindahMenu') {
                const targetMenu = event.data.menu;
                const menuTargetElemen = document.querySelector(`[onclick*="'${targetMenu}'"]`);
                if (menuTargetElemen) {
                    gantiMenu(menuTargetElemen, targetMenu);
                }
            }
        });
    </script>
</body>
</html>
