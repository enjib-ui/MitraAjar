<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Modul Ajar Generator (Modular)</title>
    <script>
    // --- PROTEKSI HALAMAN (ROUTE GUARD) ---
    try {
        // 1. Cek apakah dibuka langsung (tidak di dalam iframe)
        // 2. Cek apakah Firebase di file utama ada
        // 3. Cek apakah ada pengguna yang sedang login di file utama
        if (window === window.parent || !window.parent.firebase || !window.parent.firebase.auth().currentUser) {
            // Jika melanggar, tendang paksa ke halaman login utama
            window.top.location.href = "index.html"; 
        }
    } catch (e) {
        // Antisipasi jika ada error cross-origin, langsung tendang ke halaman login
        window.top.location.href = "index.html";
    }
</script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --primary-teal: #0d9488; }
        body { background-color: #f0fdfa; }
        .a4-paper {
            width: 100%;
            max-width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            margin: 0 auto;
            border-radius: 4px;
        }
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .a4-paper { 
                box-shadow: none; margin: 0; padding: 0; 
                width: 100%; max-width: none; min-height: auto;
            }
        }
        /* Style tabel untuk fallback agar rapi jika AI lupa memberi class tailwind */
        #contentState table { width: 100%; border-collapse: collapse; margin-top: 1rem; margin-bottom: 1rem; }
        #contentState th, #contentState td { border: 1px solid #cbd5e1; padding: 0.5rem; text-align: left; }
        #contentState th { background-color: #f8fafc; font-weight: 600; }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen">

    <header class="bg-teal-700 text-white p-4 shadow-md no-print">
        <div class="container mx-auto flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-2xl"></i>
            <h1 class="text-2xl font-bold">AI Modul Ajar (Mode Modular)</h1>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6 lg:p-8 flex flex-col lg:flex-row gap-8">
        
        <section class="w-full lg:w-1/3 bg-white p-6 rounded-xl shadow-md h-fit border border-teal-100 no-print">
            <h2 class="text-xl font-semibold mb-4 text-teal-800 border-b pb-2">Data Pembelajaran</h2>
            
            <form id="modulForm" class="flex flex-col gap-4">
                <div class="bg-slate-50 p-3 rounded-md border border-slate-200 space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Guru & Sekolah</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="namaGuru" required placeholder="Budi Santoso, S.Pd." class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                            <input type="text" id="namaSekolah" required placeholder="SMAN 1 Jakarta" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tahun Ajaran</label>
                            <input type="text" id="tahunAjaran" required placeholder="2023/2024" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Logo URL (Opsional)</label>
                            <input type="url" id="logoSekolah" placeholder="https://..." class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Mata Pelajaran & Materi</label>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <input type="text" id="mapel" required placeholder="Biologi" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                            <input type="text" id="materi" required placeholder="Ekosistem" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Fase / Waktu</label>
                            <select id="kelas" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm mb-2">
                                <option value="Fase D (Kelas 7-9)">Fase D (SMP)</option>
                                <option value="Fase E (Kelas 10)" selected>Fase E (Kls 10)</option>
                                <option value="Fase F (Kelas 11-12)">Fase F (Kls 11-12)</option>
                            </select>
                            <input type="text" id="waktu" required placeholder="2 x 45 Menit" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Model & Target</label>
                            <select id="model" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm mb-2">
                                <option value="PjBL">PjBL</option>
                                <option value="PBL">PBL</option>
                                <option value="Inkuiri">Inkuiri</option>
                            </select>
                            <select id="targetSiswa" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 text-sm">
                                <option value="Reguler">Reguler</option>
                                <option value="Berdiferensiasi">Berdiferensiasi</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mt-4 pt-4 border-t border-slate-200">
                    <h3 class="font-bold text-teal-800 mb-3 text-sm"><i class="fa-solid fa-gears"></i> Panel Generate (Modular)</h3>
                    <p class="text-xs text-slate-500 mb-3">Klik tombol secara berurutan untuk menyusun modul tanpa terpotong.</p>
                    
                    <div class="flex flex-col gap-2">
                        <button type="button" onclick="generatePart('inti', btnInti)" id="btnInti" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-3 rounded text-sm transition flex items-center justify-between">
                            <span>1. Modul Inti & Langkah Ajar</span> <i class="fa-solid fa-play"></i>
                        </button>
                        <button type="button" onclick="generatePart('lkpd', btnLkpd)" id="btnLkpd" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-3 rounded text-sm transition flex items-center justify-between">
                            <span>2. Lembar Kerja (LKPD)</span> <i class="fa-solid fa-play"></i>
                        </button>
                        <button type="button" onclick="generatePart('rubrik', btnRubrik)" id="btnRubrik" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-3 rounded text-sm transition flex items-center justify-between">
                            <span>3. Rubrik Penilaian</span> <i class="fa-solid fa-play"></i>
                        </button>
                        <button type="button" onclick="generatePart('soal', btnSoal)" id="btnSoal" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-3 rounded text-sm transition flex items-center justify-between">
                            <span>4. Soal Evaluasi & Kunci</span> <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>
                
                <button type="button" onclick="resetAll()" class="w-full mt-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded-md transition text-sm">
                    <i class="fa-solid fa-rotate-right"></i> Reset Dokumen
                </button>
            </form>
        </section>

        <section class="w-full lg:w-2/3 flex flex-col gap-4">
            <div class="flex flex-wrap justify-end gap-2 no-print" id="actionToolbar" style="display: none;">
                <button onclick="downloadPDF()" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded shadow flex items-center gap-2 text-sm transition">
                    <i class="fa-solid fa-file-pdf"></i> PDF
                </button>
                <button onclick="downloadWord()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded shadow flex items-center gap-2 text-sm transition">
                    <i class="fa-solid fa-file-word"></i> Word
                </button>
                <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 px-4 rounded shadow flex items-center gap-2 text-sm transition">
                    <i class="fa-solid fa-print"></i> Print
                </button>
            </div>

            <div class="a4-paper relative text-sm sm:text-base text-slate-900 leading-relaxed">
                <div id="emptyState" class="h-full flex flex-col items-center justify-center text-slate-400 opacity-70 mt-32 no-print">
                    <i class="fa-solid fa-puzzle-piece text-6xl mb-4"></i>
                    <p class="text-center">Dokumen belum dibuat.<br>Gunakan Panel Generate di sebelah kiri.</p>
                </div>

                <div id="contentState" class="prose prose-slate max-w-none w-full">
                    <div id="view-inti"></div>
                    <div id="view-lkpd"></div>
                    <div id="view-rubrik"></div>
                    <div id="view-soal"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT DI SINI (Hasil Deploy)
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzLsptjHHilLFEsj140r3oyW7uTFs1yzO1vnI7mRI7swHsugqY_bn8FIL3d4DLIJZhleQ/exec';

        // Object untuk menyimpan hasil tiap bagian
        let documentParts = {
            inti: "",
            lkpd: "",
            rubrik: "",
            soal: ""
        };

        // Mengambil data formulir
        function getFormData() {
            return {
                guru: document.getElementById('namaGuru').value || '[Nama Guru]',
                sekolah: document.getElementById('namaSekolah').value || '[Nama Sekolah]',
                tahun: document.getElementById('tahunAjaran').value || '[Tahun]',
                logo: document.getElementById('logoSekolah').value,
                mapel: document.getElementById('mapel').value || '[Mapel]',
                materi: document.getElementById('materi').value || '[Materi]',
                kelas: document.getElementById('kelas').value,
                waktu: document.getElementById('waktu').value || '[Waktu]',
                model: document.getElementById('model').value,
                target: document.getElementById('targetSiswa').value
            };
        }

        // Fungsi Utama Pemanggilan Tiap Bagian ke Backend GAS
        async function generatePart(partName, buttonElement) {
            const data = getFormData();
            if(data.mapel === '[Mapel]' || data.materi === '[Materi]') {
                alert("Mohon isi minimal Mata Pelajaran dan Materi terlebih dahulu!");
                return;
            }

            // Ubah state tombol menjadi loading
            const originalText = buttonElement.innerHTML;
            buttonElement.disabled = true;
            buttonElement.classList.replace('bg-teal-600', 'bg-slate-400');
            buttonElement.innerHTML = `<span>Menyusun...</span> <i class="fa-solid fa-spinner fa-spin"></i>`;

            // Siapkan Prompt Spesifik per Bagian
            let promptText = "";
            
            // 1. Ukuran logo diperbesar menjadi w-56 h-56 (sekitar 224px) dan diberi margin vertikal my-8
            const logoHtml = data.logo ? `<img src="${data.logo}" alt="Logo" class="w-56 h-56 object-contain my-8 mx-auto shadow-sm rounded-lg">` : `<div class="my-12"></div>`;

            if (partName === 'inti') {
                promptText = `Buatkan "Bagian Inti" Modul Ajar untuk Mapel: ${data.mapel}, Materi: ${data.materi}, Kelas: ${data.kelas}, Model: ${data.model}.
                OUTPUT HARUS HTML VALID (Tanpa tag markdown \`\`\`).
                PENTING: Anda bertindak sebagai Guru Ahli. JABARKAN SECARA LENGKAP DAN DETAIL semua instruksi di dalam kurung siku [...]. Jangan ada yang dikosongkan atau disalin mentah-mentah!
                Gunakan template HTML dan styling Tailwind persis seperti ini, lengkapi bagian [...]:
                
                <div class="text-center min-h-[900px] flex flex-col justify-center border-4 border-double border-teal-600 p-10 mb-10" style="page-break-after: always;">
                    
                    <h1 class="text-4xl font-black text-teal-900 mb-6">MODUL AJAR</h1>
                    <h2 class="text-2xl font-bold text-slate-700 bg-teal-50 py-3 rounded-lg border border-teal-200 uppercase">${data.mapel}</h2>
                    
                    ${logoHtml}

                    <div class="mt-4">
                        <p class="text-lg text-slate-500">Materi Pokok:</p>
                        <p class="text-3xl font-bold text-teal-700 mb-12">${data.materi}</p>
                        <div class="space-y-2">
                            <p class="text-xl font-semibold uppercase">${data.guru}</p>
                            <p class="text-lg uppercase">${data.sekolah}</p>
                            <p class="text-slate-500 uppercase">${data.tahun}</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-6 mb-10">
                    <h2 class="text-2xl font-bold bg-teal-600 text-white px-4 py-2 rounded">A. INFORMASI UMUM & INTI</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 bg-slate-50 p-5 rounded-lg border border-slate-200">
                        <div><strong>Fase/Kelas:</strong> ${data.kelas}</div>
                        <div><strong>Alokasi Waktu:</strong> ${data.waktu}</div>
                        <div><strong>Model Ajar:</strong> ${data.model}</div>
                        <div><strong>Target Siswa:</strong> ${data.target}</div>
                    </div>
                    
                    <div class="p-4 border-l-4 border-teal-500 bg-teal-50">
                        <h3 class="font-bold text-teal-800">Capaian Pembelajaran (CP) & Tujuan Pembelajaran (TP):</h3>
                        <div class="mt-2 text-slate-700">
                            [TULISKAN CP SESUAI FASE, DAN SUSUN 3 TUJUAN PEMBELAJARAN YANG SPESIFIK MENGGUNAKAN BULLET POINTS]
                        </div>
                    </div>

                    <div>
                        <h3 class="font-bold">Materi Pembelajaran:</h3>
                        <div class="text-justify border p-4 rounded bg-white">
                            [TULISKAN RANGKUMAN MATERI ${data.materi} SECARA DETAIL MINIMAL 3 PARAGRAF]
                        </div>
                    </div>

                    <h3 class="font-bold text-lg border-b-2 border-teal-500 mb-4 pb-2">Langkah-Langkah Pembelajaran (${data.model})</h3>
                    <div class="space-y-4">
                        
                        <div class="border border-slate-200 rounded-lg overflow-hidden shadow-sm">
                            <div class="bg-slate-100 px-4 py-2 font-bold text-slate-700 border-b">1. Pendahuluan</div>
                            <div class="p-4 bg-white text-sm text-slate-700">
                                <ul class="list-disc ml-5 space-y-2">
                                    [BUAT MINIMAL 4 BULLET POINTS DETAIL: Aktivitas salam, doa, presensi, apersepsi, motivasi, dan penyampaian tujuan pembelajaran]
                                </ul>
                            </div>
                        </div>

                        <div class="border border-teal-200 rounded-lg overflow-hidden shadow-sm">
                            <div class="bg-teal-50 px-4 py-2 font-bold text-teal-900 border-b border-teal-200">2. Kegiatan Inti</div>
                            <div class="p-4 bg-white text-sm text-slate-700 space-y-4">
                                [JABARKAN DETAIL: Sintaks model ${data.model} langkah demi langkah. Jelaskan apa yang dilakukan guru dan apa yang dilakukan siswa pada tiap sintaks. Tulis secara panjang dan mendalam!]
                            </div>
                        </div>

                        <div class="border border-slate-200 rounded-lg overflow-hidden shadow-sm">
                            <div class="bg-slate-100 px-4 py-2 font-bold text-slate-700 border-b">3. Penutup</div>
                            <div class="p-4 bg-white text-sm text-slate-700">
                                <ul class="list-disc ml-5 space-y-2">
                                    [BUAT MINIMAL 4 BULLET POINTS DETAIL: Aktivitas menyimpulkan materi, refleksi guru dan siswa, asesmen formatif singkat, penugasan jika ada, dan doa penutup]
                                </ul>
                            </div>
                        </div>

                    </div>
                </div>`;
            } 
            else if (partName === 'lkpd') {
                promptText = `Buatkan "Lembar Kerja Peserta Didik (LKPD)" untuk Mapel: ${data.mapel}, Materi: ${data.materi}.
                OUTPUT HARUS HTML VALID (Tanpa markdown). Gunakan template berikut dan isi detail materinya secara lengkap:
                <div class="space-y-6 mb-10 pt-10 border-t-2" style="page-break-before: always;">
                    <h2 class="text-2xl font-bold bg-teal-600 text-white px-4 py-2 rounded">B. LEMBAR KERJA PESERTA DIDIK (LKPD)</h2>
                    <div class="border-2 border-dashed border-teal-300 p-6 rounded-lg bg-white">
                        <h3 class="text-center font-bold text-xl uppercase mb-6">Aktivitas Siswa: ${data.materi}</h3>
                        <div class="space-y-4">
                            <div><strong class="text-teal-800">1. Tujuan Aktivitas:</strong> <p>[Tulis tujuan LKPD secara detail]</p></div>
                            <div><strong class="text-teal-800">2. Alat & Bahan:</strong> <p>[Tulis alat bahan yang dibutuhkan]</p></div>
                            <div><strong class="text-teal-800">3. Langkah Kerja:</strong> <ol class="list-decimal ml-5">[Tulis langkah instruksi yang jelas]</ol></div>
                            <div><strong class="text-teal-800">4. Tabel/Kolom Pengamatan & Analisis:</strong> <p>[Buat format tabel untuk siswa mengisi jawaban menggunakan tag HTML table]</p></div>
                            <div><strong class="text-teal-800">5. Bahan Diskusi:</strong> <p>[Tulis 3 pertanyaan menantang terkait hasil pengamatan]</p></div>
                        </div>
                    </div>
                </div>`;
            }
            else if (partName === 'rubrik') {
                promptText = `Buatkan "Rubrik Penilaian" untuk Modul Ajar Mapel: ${data.mapel}, Materi: ${data.materi}.
                OUTPUT HARUS HTML VALID (Tanpa markdown). Gunakan template berikut:
                <div class="space-y-6 mb-10 pt-10 border-t-2">
                    <h2 class="text-2xl font-bold bg-teal-600 text-white px-4 py-2 rounded">C. RUBRIK PENILAIAN</h2>
                    <h3 class="font-bold text-slate-700 mt-4">1. Penilaian Sikap (Profil Pelajar Pancasila)</h3>
                    <table class="w-full border-collapse border border-slate-400 text-sm mb-6 text-slate-700">
                        <thead><tr class="bg-slate-200"><th>Kriteria</th><th>Mulai Berkembang (1)</th><th>Berkembang (2)</th><th>Mahir (3)</th><th>Sangat Mahir (4)</th></tr></thead>
                        <tbody>[Isi dengan kriteria mandiri, gotong royong, bernalar kritis]</tbody>
                    </table>
                    <h3 class="font-bold text-slate-700 mt-4">2. Penilaian Keterampilan / Proyek</h3>
                    <table class="w-full border-collapse border border-slate-400 text-sm text-slate-700">
                        <thead><tr class="bg-slate-200"><th>Aspek</th><th>Skor 1</th><th>Skor 2</th><th>Skor 3</th><th>Skor 4</th></tr></thead>
                        <tbody>[Isi dengan aspek persiapan, pelaksanaan, dan hasil karya/presentasi]</tbody>
                    </table>
                </div>`;
            }
            else if (partName === 'soal') {
                promptText = `Buatkan "Soal Evaluasi & Kunci Jawaban" untuk Modul Ajar Mapel: ${data.mapel}, Materi: ${data.materi}, Level: ${data.kelas}.
                OUTPUT HARUS HTML VALID (Tanpa markdown). Gunakan template berikut:
                <div class="space-y-6 mb-10 pt-10 border-t-2" style="page-break-before: always;">
                    <h2 class="text-2xl font-bold bg-teal-600 text-white px-4 py-2 rounded">D. EVALUASI FORMATIF / SUMATIF</h2>
                    
                    <div class="bg-white p-6 border rounded-lg shadow-sm">
                        <h3 class="font-bold underline text-lg mb-4">Bagian I: Pilihan Ganda HOTS</h3>
                        <div class="space-y-4">[Buat 5 butir soal pilihan ganda level analisis/evaluasi beserta opsi A-E]</div>
                        
                        <h3 class="font-bold underline text-lg mt-8 mb-4">Bagian II: Uraian Terbuka</h3>
                        <div class="space-y-4">[Buat 3 soal esai yang menuntut pemecahan masalah]</div>

                        <div class="mt-8 p-6 bg-teal-900 text-teal-50 rounded-lg">
                            <h3 class="font-bold border-b border-teal-700 pb-2 mb-4 text-xl">KUNCI JAWABAN & PEMBAHASAN</h3>
                            <p>[Sajikan kunci jawaban PG beserta penjelasannya]</p>
                            <p class="mt-4">[Sajikan rubrik/kata kunci jawaban untuk soal esai]</p>
                        </div>
                    </div>
                </div>`;
            }

            // Proses Fetch ke Backend Google Apps Script
            let isBerhasil = false;
            let resultHtml = "";

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    headers: { 
                        // Trik CORS GAS
                        "Content-Type": "text/plain;charset=utf-8" 
                    },
                    body: JSON.stringify({ pesan: promptText })
                });

                const resData = await response.json();
                
                if (resData.error) {
                    throw new Error(resData.error);
                }

                if (resData.balasan) {
                    resultHtml = resData.balasan;
                    // Membersihkan tag markdown jika AI masih mengirimkannya
                    resultHtml = resultHtml.replace(/```html/g, '').replace(/```/g, '').trim();
                    isBerhasil = true;
                } else {
                    throw new Error("Respon dari backend tidak sesuai format.");
                }

            } catch (error) {
                console.error("Error Fetching:", error);
                alert("Gagal memanggil server GAS: " + error.message);
            }

            // Update UI setelah selesai
            if (isBerhasil) {
                documentParts[partName] = resultHtml;
                document.getElementById(`view-${partName}`).innerHTML = resultHtml;
                
                buttonElement.classList.replace('bg-slate-400', 'bg-emerald-600');
                buttonElement.innerHTML = `<span>Selesai!</span> <i class="fa-solid fa-check"></i>`;
                
                checkVisibility();
            } else {
                buttonElement.classList.replace('bg-slate-400', 'bg-teal-600');
                buttonElement.innerHTML = originalText;
            }
            buttonElement.disabled = false;
        }

        // Mengecek apakah ada dokumen yang siap ditampilkan
        function checkVisibility() {
            const hasContent = Object.values(documentParts).some(val => val !== "");
            if (hasContent) {
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('actionToolbar').style.display = 'flex';
            }
        }

        // Mereset semua form dan output
        function resetAll() {
            if(confirm("Yakin ingin mereset seluruh hasil?")) {
                documentParts = { inti: "", lkpd: "", rubrik: "", soal: "" };
                ['inti', 'lkpd', 'rubrik', 'soal'].forEach(part => {
                    document.getElementById(`view-${part}`).innerHTML = "";
                });
                
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('actionToolbar').style.display = 'none';
                
                // Reset styling tombol
                const btns = [
                    {id: 'btnInti', text: '1. Modul Inti & Langkah Ajar'},
                    {id: 'btnLkpd', text: '2. Lembar Kerja (LKPD)'},
                    {id: 'btnRubrik', text: '3. Rubrik Penilaian'},
                    {id: 'btnSoal', text: '4. Soal Evaluasi & Kunci'}
                ];
                
                btns.forEach(b => {
                    const el = document.getElementById(b.id);
                    el.className = "w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-3 rounded text-sm transition flex items-center justify-between";
                    el.innerHTML = `<span>${b.text}</span> <i class="fa-solid fa-play"></i>`;
                });
            }
        }

        // Export PDF
        function downloadPDF() {
            const element = document.getElementById('contentState');
            const mapel = document.getElementById('mapel').value.replace(/ /g, "_");
            const materi = document.getElementById('materi').value.replace(/ /g, "_");
            
            const opt = {
                margin:       [10, 10, 10, 10],
                filename:     `Modul_${mapel}_${materi}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'] }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Export Word
        function downloadWord() {
            const content = document.getElementById('contentState').innerHTML;
            const mapel = document.getElementById('mapel').value.replace(/ /g, "_");
            const materi = document.getElementById('materi').value.replace(/ /g, "_");

            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' "+
                "xmlns:w='urn:schemas-microsoft-com:office:word' "+
                "xmlns='http://www.w3.org/TR/REC-html40'>"+
                "<head><meta charset='utf-8'><title>Modul Ajar</title>"+
                "<style>table {width:100%; border-collapse:collapse; margin-bottom:15px;} th, td {border:1px solid #000; padding:8px; text-align:left;} th {background-color:#f2f2f2;}</style>"+
                "</head><body>";
            const footer = "</body></html>";
            const sourceHTML = header + content + footer;
            
            const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
            const fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = source;
            fileDownload.download = `Modul_${mapel}_${materi}.doc`;
            fileDownload.click();
            document.body.removeChild(fileDownload);
        }
    </script>
</body>
